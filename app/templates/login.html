<!doctype html>
<html lang="en">

<head>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">Login</span>
    </div>
  </nav>

  {% with messages = get_flashed_messages(request) %}
  {% if messages %}
  <div class="flash-container container">
    {% for message in messages %}
    <div class="row justify-content-center">
      <div class="alert alert-success" role="alert">
        {{ message }}
      </div>
    </div>
    {% endfor %}
  </div>
  {% endif %}
  {% endwith %}

<main class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="row w-100 justify-content-center">
      <div class="col-12 col-md-6 col-lg-4">
        
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h2 class="card-title h4 text-center mb-4">Login</h2>

            <form action="/login" method="POST">
              <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input name="username" id="username" type="text" class="form-control" required>
              </div>

              <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input name="password" id="password" type="password" class="form-control" required>
              </div>

              <div class="d-grid">
                <button class="btn btn-primary" type="submit">
                  Login
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
